<!DOCTYPE html>
<html>

	<head>
		<meta charset="utf-8">
		<title>Hello MUI</title>
		<meta name="viewport" content="width=device-width, initial-scale=1,maximum-scale=1,user-scalable=no">
		<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black">
		<link rel="stylesheet" href="./css/mui.min.css">
		<script src="./js/mui.min.js"></script>
		<script src="./js/config.js"></script>
		<style>
			/* 长按操作菜单样式 */
			.action-sheet {
				position: fixed;
				left: 0;
				right: 0;
				bottom: 0;
				background: #fff;
				z-index: 1000;
				transform: translateY(100%);
				transition: transform 0.3s ease;
				border-radius: 12px 12px 0 0;
				overflow: hidden;
			}
			.action-sheet.show {
				transform: translateY(0);
			}
			.action-sheet-mask {
				position: fixed;
				left: 0;
				right: 0;
				top: 0;
				bottom: 0;
				background: rgba(0,0,0,0.4);
				z-index: 999;
				display: none;
			}
			.action-sheet-mask.show {
				display: block;
			}
			.action-sheet-title {
				padding: 15px;
				text-align: center;
				font-size: 14px;
				color: #666;
				border-bottom: 1px solid #eee;
			}
			.action-sheet-btn {
				padding: 15px;
				text-align: center;
				font-size: 16px;
				color: #333;
				border-bottom: 1px solid #eee;
			}
			.action-sheet-btn:active {
				background: #f5f5f5;
			}
			.action-sheet-btn.danger {
				color: #ff3b30;
			}
			.action-sheet-cancel {
				padding: 15px;
				text-align: center;
				font-size: 16px;
				color: #666;
				margin-top: 8px;
				background: #f5f5f5;
			}
		</style>
	</head>

	<body>
		<header class="mui-bar mui-bar-nav">
			<a class="mui-action-back mui-icon mui-icon-left-nav mui-pull-left"></a>
			<h1 class="mui-title">待处理故障</h1>
		</header>
		<div id="load_card" class="mui-content">
		    <ul id="list" class="mui-table-view mui-table-view-striped mui-table-view-condensed">
		    </ul>
		</div>

		<!-- 长按操作菜单 -->
		<div class="action-sheet-mask" id="actionMask"></div>
		<div class="action-sheet" id="actionSheet">
			<div class="action-sheet-title" id="actionTitle">选择操作</div>
			<div class="action-sheet-btn danger" id="btnMarkHandled">标记为已处理</div>
			<div class="action-sheet-cancel" id="btnCancel">取消</div>
		</div>
	</body>
	<script>
		// ========== 全局变量 ==========
		var data_arr = [{}];
		var list = document.getElementById("list");
		var selectedFaultId = null;  // 当前选中的故障ID
		var selectedFaultData = null;  // 当前选中的故障数据

		// 监听刷新事件（来自提交故障页面）
		window.addEventListener('refreshFaultList',function(event){
			console.log('收到刷新事件，重新加载数据');
			// 重置分页
			pageNum = 1;
			// 清空列表
			list.innerHTML = '';
			// 重新加载数据
			load_new_data();
		});

		// ========== 列表渲染 ==========
		var createFragment = function(count) {
			var fragment = document.createDocumentFragment();
			var li;
			for (var i = 0; i < count; i++) {
				li = document.createElement('li');
				li.className = 'mui-table-view-cell';
				li.id = data_arr[i].id;
				// 存储路灯编号到 data 属性
				li.setAttribute('data-lightId', data_arr[i].lightId || '');
				li.setAttribute('data-index', i);  // 存储索引，方便查找数据
				// 兼容 creatTime/createTime，添加空值判断
				var timeStr = data_arr[i].creatTime || data_arr[i].createTime || '';
				var displayTime = timeStr ? timeStr.substr(0, 10) : '-';
				li.innerHTML = '<div class="mui-table"><div class="mui-table-cell mui-col-xs-10"><h4 class="mui-ellipsis">' + (data_arr[i].title || '无标题') + '</h4><p class="mui-h6 mui-ellipsis">' + (data_arr[i].content || '无内容') + '</p></div><div class="mui-table-cell mui-col-xs-2 mui-text-right"><span>' + displayTime + '</span></div></div>';

				// 为每个列表项绑定长按事件
				(function(item, data) {
					var longTapTimer = null;

					item.addEventListener('touchstart', function(e) {
						longTapTimer = setTimeout(function() {
							console.log('📌 长按触发');
							// 震动反馈（如果支持）
							if (navigator.vibrate) {
								navigator.vibrate(50);
							}
							onLongTap(item, data);
						}, 600);  // 600ms 触发长按
					}, { passive: true });

					item.addEventListener('touchend', function(e) {
						if (longTapTimer) {
							clearTimeout(longTapTimer);
							longTapTimer = null;
						}
					}, { passive: true });

					item.addEventListener('touchmove', function(e) {
						if (longTapTimer) {
							clearTimeout(longTapTimer);
							longTapTimer = null;
						}
					}, { passive: true });
				})(li, data_arr[i]);

				fragment.appendChild(li);
			}
			return fragment;
		};

		// 长按事件处理
		function onLongTap(element, faultData) {
			var id = element.getAttribute('id');
			var lightId = element.getAttribute('data-lightId');

			selectedFaultId = id;
			selectedFaultData = faultData;
			if (selectedFaultData) {
				selectedFaultData.lightId = lightId;
			}

			console.log('📋 长按选中故障:', selectedFaultId, '路灯编号:', lightId);

			// 显示操作菜单
			showActionSheet(faultData);
		}

		var pageNum = 1;
		mui.init({
			pullRefresh : {
				container:"#load_card",
				up : {
					height:50,
					auto: true,
					callback :load_new_data
				}
			}
		});

		function load_new_data() {
			mui.ajax(appConfig.getApiUrl(appConfig.api.endpoints.faultFindAll) + '/' + pageNum,{
				dataType:'json',
				type:'get',
				timeout:10000,
				headers:{'Content-Type':'application/json'},
				success:function(data){
					console.log('=== 故障列表响应 ===');
					console.log('原始数据:', JSON.stringify(data));
					// 兼容多种响应格式
					var records = null;
					if (data && data.code === 200 && data.data) {
						records = data.data.records || (Array.isArray(data.data) ? data.data : null);
					} else if (data && data.records) {
						records = data.records;
					} else if (Array.isArray(data)) {
						records = data;
					}

					if(records && records.length > 0){
						// 根据status过滤待处理(1)的故障
						var filteredData = records.filter(function(item) {
							return item.status === 1 || item.status === "1" || item.handled === 1 || item.handled === "1";
						});
						if(filteredData.length > 0) {
							data_arr = filteredData;
							list.appendChild(createFragment(data_arr.length));
							pageNum = pageNum + 1;
						}
					}
				},
				error:function(xhr,type,errorThrown){
					console.log(errorThrown)
					mui.toast("加载失败，请重试");
				}
			});
			setTimeout(function() {
				mui('#load_card').pullRefresh().endPullupToRefresh(true);
			}, 1000);
		}

		// ========== 点击事件：查看详情 ==========
		mui(".mui-table-view").on('tap', '.mui-table-view-cell', function (e) {
			var id = this.getAttribute('id');
			var index = this.getAttribute('data-index');
			// 从data_arr中查找完整数据
			var selectedItem = index !== null ? data_arr[parseInt(index)] : data_arr.find(function(item) {
				return item.id == id || item.id === parseInt(id);
			});
			mui.openWindow({
				url: 'failure_details.html',
				id:'failure_details',
				extras:{
					detailId: id,
					detailData: selectedItem
				}
			});
		});

		// ========== 操作菜单相关 ==========
		var actionSheet = document.getElementById('actionSheet');
		var actionMask = document.getElementById('actionMask');
		var actionTitle = document.getElementById('actionTitle');
		var btnMarkHandled = document.getElementById('btnMarkHandled');
		var btnCancel = document.getElementById('btnCancel');

		function showActionSheet(faultData) {
			var title = (faultData && faultData.title) ? faultData.title : '故障处理';
			var lightId = (faultData && faultData.lightId) ? faultData.lightId : '未知路灯';
			actionTitle.innerText = title + ' - ' + lightId;
			actionSheet.classList.add('show');
			actionMask.classList.add('show');
			console.log('📱 操作菜单已显示');
		}

		function hideActionSheet() {
			actionSheet.classList.remove('show');
			actionMask.classList.remove('show');
			selectedFaultId = null;
		}

		// 点击遮罩关闭
		actionMask.addEventListener('tap', hideActionSheet);

		// 取消按钮
		btnCancel.addEventListener('tap', hideActionSheet);

		// 标记已处理
		btnMarkHandled.addEventListener('tap', function() {
			// 先保存选中的ID，因为 hideActionSheet 会清空它
			var faultId = selectedFaultId;
			var faultData = selectedFaultData;

			hideActionSheet();

			if (faultId) {
				console.log('🔘 点击标记已处理按钮，故障ID:', faultId);
				// 使用原生确认框
				if (typeof plus !== 'undefined') {
					plus.nativeUI.confirm('确定将此故障标记为已处理？', function(e) {
						console.log('确认框结果:', e.index);
						if (e.index === 1) {
							markFaultAsHandled(faultId, faultData);
						}
					}, '确认操作', ['取消', '确定']);
				} else {
					if (confirm('确定将此故障标记为已处理？')) {
						markFaultAsHandled(faultId, faultData);
					}
				}
			} else {
				console.log('❌ 没有选中的故障ID');
			}
		});

		/**
		 * 将故障标记为已处理
		 * @param {number} faultId - 故障ID
		 * @param {object} faultData - 故障数据
		 */
		function markFaultAsHandled(faultId, faultData) {
			console.log('🔧 标记故障为已处理:', faultId);

			var apiUrl = appConfig.getApiUrl(appConfig.api.endpoints.faultCheck) + '?id=' + faultId;
			console.log('API URL:', apiUrl);

			mui.ajax(apiUrl, {
				dataType: 'json',
				type: 'get',
				timeout: 10000,
				headers: {'Content-Type': 'application/json'},
				success: function(data) {
					console.log('✅ 故障标记已处理响应:', JSON.stringify(data));

					// 判断成功 - 兼容多种响应格式
					var isSuccess = false;
					if (data && data.code === 200) {
						isSuccess = true;
					} else if (data === true || data === "success" || data === "true") {
						isSuccess = true;
					} else if (data && data.data === true) {
						isSuccess = true;
					}

					if (isSuccess) {
						mui.toast("已标记为已处理");

						// 检查该路灯是否还有其他待处理故障
						var lightId = faultData ? (faultData.lightId || faultData.light_id) : null;
						if (lightId) {
							checkAndSetLampNormal(lightId, faultId);
						}

						// 刷新当前列表
						pageNum = 1;
						list.innerHTML = '';
						data_arr = [];
						load_new_data();

						// 通知已处理故障页面刷新
						if (typeof plus !== 'undefined') {
							var handledPage = plus.webview.getWebviewById('handled_fault.html');
							if (handledPage) {
								mui.fire(handledPage, 'refreshHandledList');
							}

							// 通知路灯列表页面刷新
							var lampPage = plus.webview.getWebviewById('lamp.html');
							if (lampPage) {
								mui.fire(lampPage, 'refreshLampList');
							}
						}
					} else {
						console.error('❌ 操作失败，响应:', data);
						mui.toast("操作失败: " + (data && (data.msg || data.message) || '未知错误'));
					}
				},
				error: function(xhr, type, errorThrown) {
					console.error('❌ 标记失败:', type, errorThrown);
					console.error('响应内容:', xhr.responseText);
					mui.toast("操作失败，请重试");
				}
			});
		}

		/**
		 * 检查路灯是否还有其他待处理故障，没有则设为正常
		 * @param {string} lightId - 路灯物理编号
		 * @param {number} excludeFaultId - 排除的故障ID（当前已处理的）
		 */
		function checkAndSetLampNormal(lightId, excludeFaultId) {
			console.log('🔍 检查路灯', lightId, '是否还有其他待处理故障');

			// 查询所有故障
			mui.ajax(appConfig.getApiUrl(appConfig.api.endpoints.faultQueryAll), {
				dataType: 'json',
				type: 'post',
				timeout: 10000,
				headers: {'Content-Type': 'application/json'},
				success: function(data) {
					console.log('故障查询响应:', data);

					// 解析故障数据
					var faults = null;
					if (data && data.code === 200 && data.data) {
						faults = data.data.records || data.data;
					} else if (data && data.records) {
						faults = data.records;
					} else if (Array.isArray(data)) {
						faults = data;
					}

					if (faults && faults.length > 0) {
						// 筛选该路灯的其他待处理故障
						var otherPendingFaults = faults.filter(function(fault) {
							var isSameLamp = fault.lightId === lightId || fault.light_id === lightId;
							var isPending = fault.status === 1 || fault.status === "1";
							var isNotCurrent = fault.id != excludeFaultId && fault.id !== parseInt(excludeFaultId);
							return isSameLamp && isPending && isNotCurrent;
						});

						console.log('该路灯其他待处理故障数量:', otherPendingFaults.length);

						// 如果没有其他待处理故障，将路灯设为正常
						if (otherPendingFaults.length === 0) {
							console.log('✅ 该路灯没有其他待处理故障，设为正常状态');
							findLampAndSetNormal(lightId);
						} else {
							console.log('⚠️ 该路灯还有其他待处理故障，保持故障状态');
						}
					}
				},
				error: function(xhr, type, errorThrown) {
					console.error('❌ 查询故障失败:', errorThrown);
				}
			});
		}

		/**
		 * 查找路灯并设为正常状态
		 * @param {string} lightId - 路灯物理编号
		 */
		function findLampAndSetNormal(lightId) {
			console.log('🔍 查找路灯:', lightId);

			// 查询路灯列表
			mui.ajax(appConfig.getApiUrl(appConfig.api.endpoints.lampsFindAll) + '/1', {
				dataType: 'json',
				type: 'get',
				timeout: 10000,
				headers: {'Content-Type': 'application/json'},
				success: function(data) {
					var lamps = null;
					if (data && data.code === 200 && data.data) {
						lamps = data.data.records || data.data;
					} else if (data && data.records) {
						lamps = data.records;
					} else if (Array.isArray(data)) {
						lamps = data;
					}

					if (lamps && lamps.length > 0) {
						var targetLamp = lamps.find(function(lamp) {
							return lamp.lightId === lightId || lamp.lightId === String(lightId);
						});

						if (targetLamp) {
							console.log('✅ 找到路灯:', targetLamp);
							setLampNormal(targetLamp.id);
						} else {
							console.warn('⚠️ 未找到编号为', lightId, '的路灯');
						}
					}
				},
				error: function(xhr, type, errorThrown) {
					console.error('❌ 查询路灯失败:', errorThrown);
				}
			});
		}

		/**
		 * 将路灯设为正常状态
		 * @param {number} lampId - 路灯数据库ID
		 */
		function setLampNormal(lampId) {
			console.log('🔧 将路灯 ID:', lampId, '设为正常状态');

			var apiUrl = appConfig.getApiUrl(appConfig.api.endpoints.lampsNormal) + '?id=' + lampId;
			console.log('API URL:', apiUrl);

			mui.ajax(apiUrl, {
				dataType: 'json',
				type: 'post',
				timeout: 10000,
				headers: {'Content-Type': 'application/json'},
				success: function(data) {
					console.log('✅ 路灯状态已更新为正常:', data);
					mui.toast("路灯已恢复正常状态");
				},
				error: function(xhr, type, errorThrown) {
					console.error('❌ 更新路灯状态失败:', errorThrown);
				}
			});
		}
	</script>
</html>
