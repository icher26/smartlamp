<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
	<title>登录 - 路灯管理系统</title>
	<script src="js/mui.min.js"></script>
	<link href="css/mui.min.css" rel="stylesheet"/>
	<script type="text/javascript" charset="utf-8">
		mui.init();

		mui.plusReady(function() {
			// 设置状态栏背景为浅色
			plus.navigator.setStatusBarBackground("#F7F7F7");
		});

		var clickNum = 0;
		mui.back = function(event) {
			clickNum++;
			if(clickNum > 1) {
				plus.runtime.quit();
			} else {
				mui.toast("再按一次退出应用");
			}
			setTimeout(function() {
				clickNum = 0
			}, 2000);
			return false;
		}
	</script>
</head>
<body>
	<!-- 主容器 -->
	<div class="page-container">
		<!-- Logo区域 -->
		<div class="logo-section">
			<div class="logo-icon">
				<!-- 使用SVG绘制一个简单的路灯图标 -->
				<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
					<circle cx="32" cy="32" r="30" stroke="#07C160" stroke-width="2" fill="none"/>
					<path d="M32 16 L32 48 M24 24 L40 24 M24 24 Q32 32 24 40 M40 24 Q32 32 40 40" stroke="#07C160" stroke-width="2" stroke-linecap="round" fill="none"/>
				</svg>
			</div>
			<h1 class="app-title">路灯管理系统</h1>
			<p class="app-subtitle">智能化路灯运维平台</p>
		</div>

		<!-- 操作区域 -->
		<div class="action-section">
			<!-- 主按钮卡片 -->
			<div class="action-card">
				<button id="login" class="btn-primary">
					<span class="btn-icon">
						<!-- 用户图标：圆形头部 + 弧形身体的线性图标 -->
						<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
							<circle cx="10" cy="7" r="3" stroke="currentColor" stroke-width="1.5"/>
							<path d="M4 17 C4 13 6 12 10 12 C14 12 16 13 16 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
						</svg>
					</span>
					<span class="btn-text">立即登录</span>
				</button>

				<button id="register" class="btn-secondary">
					<span class="btn-icon">
						<!-- 编辑图标：笔形状的线性图标 -->
						<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
							<path d="M14 3 L17 6 L7 16 L3 17 L4 13 Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
							<path d="M12 5 L15 8" stroke="currentColor" stroke-width="1.5"/>
						</svg>
					</span>
					<span class="btn-text">创建账号</span>
				</button>
			</div>

			<!-- 提示文字 -->
			<div class="tip-text">
				点击按钮进入相应页面
			</div>
		</div>

		<!-- 底部版权信息 -->
		<div class="footer-section">
			<p class="copyright">© 2024 路灯管理系统</p>
		</div>
	</div>
</body>
<script>
	var loginButton = document.getElementById('login');
	var registerButton = document.getElementById('register');

	loginButton.addEventListener('tap', function(event) {
		mui.openWindow({
			url: 'login_login.html',
			id: 'info'
		});
	});

	registerButton.addEventListener('tap', function(event) {
		mui.openWindow({
			url: 'login_register.html',
			id: 'info'
		});
	});
</script>
<style>
	/* ==================== 全局重置 ==================== */
	* {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
	}

	body {
		font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Helvetica Neue", Arial, sans-serif;
		background-color: #F7F7F7;
		color: #333333;
		-webkit-font-smoothing: antialiased;
		-moz-osx-font-smoothing: grayscale;
	}

	/* ==================== 页面容器 ==================== */
	.page-container {
		min-height: 100vh;
		display: flex;
		flex-direction: column;
		padding: 48px 24px 24px;
	}

	/* ==================== Logo区域 ==================== */
	.logo-section {
		flex: 1;
		display: flex;
		flex-direction: column;
		align-items: center;
		justify-content: center;
		padding-top: 60px;
		padding-bottom: 40px;
	}

	.logo-icon {
		margin-bottom: 24px;
		animation: fadeInDown 0.6s ease-out;
	}

	.app-title {
		font-size: 28px;
		font-weight: 600;
		color: #1A1A1A;
		margin-bottom: 8px;
		letter-spacing: 0.5px;
		animation: fadeInUp 0.6s ease-out 0.1s both;
	}

	.app-subtitle {
		font-size: 14px;
		color: #999999;
		font-weight: 400;
		animation: fadeInUp 0.6s ease-out 0.2s both;
	}

	/* ==================== 操作区域 ==================== */
	.action-section {
		flex: 0 0 auto;
		animation: fadeInUp 0.6s ease-out 0.3s both;
	}

	.action-card {
		background: #FFFFFF;
		border-radius: 12px;
		padding: 20px;
		box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
		margin-bottom: 16px;
	}

	/* ==================== 按钮样式 ==================== */
	/* 主按钮 - 微信绿 */
	.btn-primary {
		width: 100%;
		height: 48px;
		background-color: #07C160;
		border: none;
		border-radius: 8px;
		color: #FFFFFF;
		font-size: 16px;
		font-weight: 500;
		display: flex;
		align-items: center;
		justify-content: center;
		gap: 8px;
		transition: all 0.2s ease;
		cursor: pointer;
		margin-bottom: 12px;
	}

	.btn-primary:active {
		background-color: #06AD56;
		transform: scale(0.98);
	}

	/* 次按钮 - 白色边框 */
	.btn-secondary {
		width: 100%;
		height: 48px;
		background-color: #FFFFFF;
		border: 1px solid #E5E5E5;
		border-radius: 8px;
		color: #333333;
		font-size: 16px;
		font-weight: 400;
		display: flex;
		align-items: center;
		justify-content: center;
		gap: 8px;
		transition: all 0.2s ease;
		cursor: pointer;
	}

	.btn-secondary:active {
		background-color: #F7F7F7;
		border-color: #D1D1D1;
		transform: scale(0.98);
	}

	/* 按钮图标容器 */
	.btn-icon {
		display: flex;
		align-items: center;
		justify-content: center;
		width: 20px;
		height: 20px;
	}

	.btn-text {
		line-height: 1;
	}

	/* ==================== 提示文字 ==================== */
	.tip-text {
		text-align: center;
		font-size: 13px;
		color: #999999;
		padding: 12px 0;
	}

	/* ==================== 底部版权 ==================== */
	.footer-section {
		flex: 0 0 auto;
		padding-top: 24px;
		padding-bottom: 12px;
	}

	.copyright {
		text-align: center;
		font-size: 12px;
		color: #CCCCCC;
	}

	/* ==================== 动画效果 ==================== */
	@keyframes fadeInDown {
		from {
			opacity: 0;
			transform: translateY(-20px);
		}
		to {
			opacity: 1;
			transform: translateY(0);
		}
	}

	@keyframes fadeInUp {
		from {
			opacity: 0;
			transform: translateY(20px);
		}
		to {
			opacity: 1;
			transform: translateY(0);
		}
	}

	/* ==================== 响应式优化 ==================== */
	@media (max-width: 375px) {
		.app-title {
			font-size: 24px;
		}

		.app-subtitle {
			font-size: 13px;
		}

		.btn-primary,
		.btn-secondary {
			height: 44px;
			font-size: 15px;
		}
	}
</style>
</html>
