<!doctype html>
<html>

	<head>
		<meta charset="utf-8">
		<title></title>
		<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
		<link href="css/mui.css" rel="stylesheet" />
	</head>

	<body>
		
		<header class="mui-bar mui-bar-nav">
			<a class="mui-action-back mui-icon mui-icon-left-nav mui-pull-left"></a>
			<h1 id="head_line" class="mui-title">添加维修人员</h1>
		</header>
		<div class="mui-content">
			<form class="mui-input-group">
			    <div class="mui-input-row">
			        <label>编号</label>
			        <input id="id_flag" type = "text" class="mui-input-clear">
			    </div>
				<div class="mui-input-row">
				    <label>姓名</label>
					<input id="username" type="text" class="mui-input-clear">
				</div>
				<div class="mui-input-row">
				    <label>手机号</label>
					<input id="phone" type="text" class="mui-input-clear">
				</div>
				<div class="mui-input-row">
				    <label>管理区域</label>
					<input id="area" type="text" class="mui-input-clear">
				</div>
			</form>
			<button id="submit" type="button" class="mui-btn mui-btn-green mui-btn-block">添加</button>
		</div>
		
		<script src="js/mui.js">
		</script>
		<script type="text/javascript">
			mui.init()
			
			
			var username_dom = document.getElementById("username")
			var phone_dom = document.getElementById("phone")
			var id_flag_dom = document.getElementById("id_flag")
			var area_dom = document.getElementById("area")
			var submit_button = document.getElementById("submit")
			submit_button.addEventListener('tap', function(){
				mui.ajax('http://8.137.33.218:8880/repair/addperson',{
					dataType:'json',//服务器返回json格式数据
					type:'post',//HTTP请求类型
					data:{
						"area": area_dom.value,
						"number": id_flag_dom.value,
						"phone": phone_dom.value,
						"username": username_dom.value
					},
					timeout:10000,//超时时间设置为10秒；
					headers:{'Content-Type':'application/json'},	              
					success:function(data){
						if(data.code == 200){
							plus.nativeUI.toast("添加成功");
							var lamppage = plus.webview.getWebviewById('repair_person_list')
							mui.fire(lamppage,'customEvent');
							mui.back()
						}
					},
					error:function(xhr,type,errorThrown){
						console.log(errorThrown)
					}
				});
			})
		</script>
	</body>

</html>
