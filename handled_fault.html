<!DOCTYPE html>
<html>

	<head>
		<meta charset="utf-8">
		<title>Hello MUI</title>
		<meta name="viewport" content="width=device-width, initial-scale=1,maximum-scale=1,user-scalable=no">
		<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black">
		<link rel="stylesheet" href="./css/mui.min.css">
		<script src="./js/mui.min.js"></script>
		<script src="./js/config.js"></script>
	</head>

	<body>
		<header class="mui-bar mui-bar-nav">
			<a class="mui-action-back mui-icon mui-icon-left-nav mui-pull-left"></a>
			<h1 class="mui-title">已处理故障</h1>
		</header>
		<div id="load_card" class="mui-content">
		    <ul id="list" class="mui-table-view mui-table-view-striped mui-table-view-condensed">
		    </ul>
		</div>
	</body>
	<script>
		window.addEventListener('customEvent',function(event){
			plus.webview.currentWebview().reload()
		});
		var data_arr = [{}]
		var list = document.getElementById("list");
		var createFragment = function(count) {
			var fragment = document.createDocumentFragment();
			var li;
			for (var i = 0; i < count; i++) {
				li = document.createElement('li');
				li.className = 'mui-table-view-cell';
				li.id = data_arr[i].id;
				// 兼容 creatTime/createTime，添加空值判断
				var timeStr = data_arr[i].creatTime || data_arr[i].createTime || '';
				var displayTime = timeStr ? timeStr.substr(0, 10) : '-';
				li.innerHTML = '<div class="mui-table"><div class="mui-table-cell mui-col-xs-10"><h4 class="mui-ellipsis">' + (data_arr[i].title || '无标题') + '</h4><p class="mui-h6 mui-ellipsis">' + (data_arr[i].content || '无内容') + '</p></div><div class="mui-table-cell mui-col-xs-2 mui-text-right"><span>' + displayTime + '</span></div></div>';
				fragment.appendChild(li);
			}
			return fragment;
		};
		var pageNum = 1
		mui.init({
		  pullRefresh : {	
		      container:"#load_card",//下拉刷新容器标识，querySelector能定位的css选择器均可，比如：id、.class等
		  	up : {
		  	  height:50,//可选,默认50.触发下拉刷新拖动距离,
		  	  auto: true,//可选,默认false.首次加载自动下拉刷新一次
		  	  callback :load_new_data //必选，刷新函数，根据具体业务来编写，比如通过ajax从服务器获取新数据；
		  	}
		  	
		    }
		});
		function load_new_data() {
			mui.ajax(appConfig.getApiUrl(appConfig.api.endpoints.faultFindAll) + '/' + pageNum,{
				dataType:'json',//服务器返回json格式数据
				type:'get',//HTTP请求类型
				timeout:10000,//超时时间设置为10秒；
				headers:{'Content-Type':'application/json'},
				success:function(data){
					// 兼容多种响应格式
					var records = null;
					if (data && data.code === 200 && data.data) {
						records = data.data.records || (Array.isArray(data.data) ? data.data : null);
					} else if (data && data.records) {
						records = data.records;
					} else if (Array.isArray(data)) {
						records = data;
					}

					if(records && records.length > 0){
						// 根据status过滤已处理(0)的故障
						var filteredData = records.filter(function(item) {
							return item.status === 0 || item.status === "0" || item.handled === 0 || item.handled === "0";
						});
						if(filteredData.length > 0) {
							data_arr = filteredData;
							list.appendChild(createFragment(data_arr.length));
							pageNum = pageNum + 1;
						}
					}
				},
				error:function(xhr,type,errorThrown){
					console.log(errorThrown)
					mui.toast("加载失败，请重试");
				}
			});
			setTimeout(function() {
				mui('#load_card').pullRefresh().endPullupToRefresh(true); //这行代码会隐藏掉 “正在加载...” 容器
				mui('#load_card').pullRefresh().refresh(true);
			}, 1000);
		}
		
		mui(".mui-table-view").on('tap', '.mui-table-view-cell', function (e) {
			var id = this.getAttribute('id');
			// 从data_arr中查找完整数据
			var selectedItem = data_arr.find(function(item) {
				return item.id == id || item.id === parseInt(id);
			});
			mui.openWindow({
				url: 'failure_details.html',
				id:'failure_details',
				extras:{
					detailId: id,
					detailData: selectedItem  // 传递完整数据
				}
			});
		})
	</script>
</html>
