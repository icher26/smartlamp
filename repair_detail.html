<!doctype html>
<html>

	<head>
		<meta charset="utf-8">
		<title></title>
		<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
		<link href="css/mui.css" rel="stylesheet" />
		<script src="js/mui.js"></script>
		<script src="js/config.js"></script>
	</head>

	<body>
		<header class="mui-bar mui-bar-nav">
			<a class="mui-action-back mui-icon mui-icon-left-nav mui-pull-left"></a>
			<h1 id="head_line" class="mui-title">详细信息</h1>
		</header>
		<div class="mui-content">
			<form class="mui-input-group">
			    <div class="mui-input-row">
			        <label>编号</label>
			        <input id="id_flag" type = "text" class="mui-input-clear">
			    </div>
				<div class="mui-input-row">
				    <label>姓名</label>
					<input id="username" type="text" class="mui-input-clear">
				</div>
				<div class="mui-input-row">
				    <label>手机号</label>
					<input id="phone" type="text" class="mui-input-clear">
				</div>
				<div class="mui-input-row">
				    <label>管理区域</label>
					<input id="area" type="text" class="mui-input-clear">
				</div>
			</form>
			<button id="submit" type="button" class="mui-btn mui-btn-green mui-btn-block">提交修改</button>
			<button id="delate" type="button" class="mui-btn mui-btn-red mui-btn-block">删除</button>
		</div>
	</body>
	<script type="text/javascript">
		mui.back(function(){
			mui.fire(lamppage,'customEvent');
		})
		var user_id = 0
		var username_dom = document.getElementById("username")
		var phone_dom = document.getElementById("phone")
		var id_flag_dom = document.getElementById("id_flag")
		var area_dom = document.getElementById("area")
		var delate_dom = document.getElementById("delate")
		var submit_dom = document.getElementById("submit")
		mui.plusReady(function(){
			var self = plus.webview.currentWebview();
			var change_status_dom = document.getElementById("change_status")
			detailId = self.detailId
			console.log(detailId)
			mui.ajax(appConfig.getApiUrl(appConfig.api.endpoints.repairSelectOne) + '/' + detailId,{
				dataType:'json',
				type:'get',
				timeout:10000,
				headers:{'Content-Type':'application/json'},
				success:function(data){
					if(data.code == 200){
						username_dom.value = data.data.username
						phone_dom.value = data.data.phone
						id_flag_dom.value = data.data.number
						area_dom.value = data.data.area
						user_id = data.data.id
					}
				},
				error:function(xhr,type,errorThrown){
					console.log(errorThrown)
					mui.toast("加载失败，请重试");
				}
			});
			delate_dom.addEventListener('tap', function(){
				// 使用 repairDelete 端点删除，ID作为路径参数
				console.log('删除用户ID:', user_id);
				var deleteUrl = appConfig.getApiUrl(appConfig.api.endpoints.repairDelete) + '/' + user_id;
				console.log('删除URL:', deleteUrl);
				mui.ajax(deleteUrl, {
					dataType:'json',
					type:'post',
					timeout:10000,
					headers:{'Content-Type':'application/json'},
					success:function(data){
						console.log('删除响应:', data);
						if(data && data.code == 200){
							mui.toast("删除成功");
							var lamppage = plus.webview.getWebviewById('repair_person_list')
							mui.fire(lamppage,'customEvent');
							mui.back()
						} else {
							mui.toast("删除失败: " + (data.msg || data.message || '未知错误'));
						}
					},
					error:function(xhr,type,errorThrown){
						console.log('删除失败:', xhr.status, xhr.responseText, errorThrown)
						mui.toast("删除失败，请重试");
					}
				});
			})
			submit_dom.addEventListener('tap', function() {
				// 使用 repairUpdate 端点更新维修人员信息
				var requestData = {
					"id": user_id,
					"area": area_dom.value,
					"number": id_flag_dom.value,
					"phone": phone_dom.value,
					"username": username_dom.value
				};
				console.log('更新数据:', JSON.stringify(requestData));

				mui.ajax(appConfig.getApiUrl(appConfig.api.endpoints.repairUpdate),{
					dataType:'json',
					type:'post',
					data: JSON.stringify(requestData),  // 手动序列化为JSON字符串
					timeout:10000,
					headers:{'Content-Type':'application/json'},
					success:function(data){
						console.log('更新响应:', data);
						if(data && data.code == 200){
							var lamppage = plus.webview.getWebviewById('repair_person_list')
							mui.fire(lamppage,'customEvent');
							mui.back()
						} else {
							mui.toast("操作失败: " + (data.msg || data.message || '未知错误'));
						}
					},
					error:function(xhr,type,errorThrown){
						console.log('更新失败:', xhr.status, xhr.responseText, errorThrown)
						mui.toast("更新失败，请重试");
					}
				});
			})
		})
	</script>

</html>
