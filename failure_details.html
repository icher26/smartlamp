<!doctype html>
<html>

	<head>
		<meta charset="utf-8">
		<title></title>
		<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
		<link href="css/mui.css" rel="stylesheet" />
		<script src="js/mui.js"></script>
		<script src="js/config.js"></script>
	</head>

	<body>
		<header class="mui-bar mui-bar-nav">
			<a class="mui-action-back mui-icon mui-icon-left-nav mui-pull-left"></a>
			<h1 id="head_line" class="mui-title"></h1>
			<a id="change_status" class="mui-icon mui-icon-loop mui-pull-right"></a>
		</header>
		<div class="mui-content">
			<div class="mui-input-group">
				<div class="mui-input-row">
					<label>编号</label>
					<span id="id_flag" class="detail-value">-</span>
				</div>
				<div class="mui-input-row">
					<label>区域</label>
					<span id="area" class="detail-value">-</span>
				</div>
			</div>
			<div class="mui-input-group" style="margin-top: 10px;">
				<div class="mui-input-row" style="height: auto; min-height: 40px;">
					<label>故障描述</label>
				</div>
				<div class="detail-content">
					<p id="content">-</p>
				</div>
			</div>
		</div>
	</body>
	<script type="text/javascript">
		mui.back(function(){
			mui.fire(lamppage,'customEvent');
		})
		var head_line_dom = document.getElementById("head_line")
		var content_dom = document.getElementById("content")
		var id_flag_span = document.getElementById("id_flag")
		var area_span = document.getElementById("area")
		var detailData = null  // 存储故障详情数据

		mui.plusReady(function(){
			var self = plus.webview.currentWebview();
			var change_status_dom = document.getElementById("change_status")
			detailId = self.detailId
			detailData = self.detailData  // 接收传递过来的完整数据
			console.log('detailId:', detailId)
			console.log('detailData:', detailData)

			// 如果有传递过来的数据，直接使用；否则从服务器获取
			if (detailData) {
				displayData(detailData);
			} else {
				// 使用 queryAll 获取所有数据，然后根据ID过滤
				mui.ajax(appConfig.getApiUrl('/faults/queryAll'),{
					dataType:'json',
					type:'post',
					timeout:10000,
					headers:{'Content-Type':'application/json'},
					success:function(data){
						console.log('queryAll响应:', data);
						var records = null;
						if (data && data.code === 200 && data.data) {
							records = data.data.records || data.data;
						} else if (Array.isArray(data)) {
							records = data;
						}
						if (records) {
							var item = records.find(function(r) {
								return r.id == detailId || r.id === parseInt(detailId);
							});
							if (item) {
								displayData(item);
							} else {
								mui.toast("未找到故障数据");
							}
						}
					},
					error:function(xhr,type,errorThrown){
						console.log('加载失败:', errorThrown)
						mui.toast("加载失败，请重试");
					}
				});
			}

			// 显示数据的函数
			function displayData(data) {
				detailData = data;
				head_line_dom.innerText = data.title || '无标题'
				content_dom.innerText = data.content || '无内容'
				id_flag_span.innerText = data.lightId || data.id || '-'
				area_span.innerText = data.area || '-'
				if(data.status == 0 || data.status == "0"){
					change_status_dom.classList.add('mui-hidden');
				}
			}

			change_status_dom.addEventListener('tap', function(){
				// 使用 faultUpdate 端点更新故障状态为已处理
				mui.ajax(appConfig.getApiUrl(appConfig.api.endpoints.faultUpdate) + '?id=' + detailId + '&status=0',{
					dataType:'json',
					type:'post',
					timeout:10000,
					headers:{'Content-Type':'application/json'},
					success:function(data){
						if(data.code == 200){
							var lamppage = plus.webview.getWebviewById('to_be_process')
							mui.fire(lamppage,'customEvent');
							mui.back()
						}
					},
					error:function(xhr,type,errorThrown){
						console.log(errorThrown)
						mui.toast("操作失败，请重试");
					}
				});
			})
		})
	</script>
	<style type="text/css">
		/* 右侧内容样式 */
		.detail-value {
			float: right;
			padding: 11px 15px;
			color: #333;
			font-size: 14px;
			max-width: 65%;
			text-align: right;
			word-break: break-all;
		}
		/* 故障描述内容区域 */
		.detail-content {
			background-color: #FFFFFF;
			padding: 10px 15px 15px 15px;
		}
		.detail-content p {
			margin: 0;
			padding: 0;
			word-wrap: break-word;
			word-break: break-all;
			font-size: 14px;
			line-height: 24px;
			color: #666;
		}
	</style>

</html>
